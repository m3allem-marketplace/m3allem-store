  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="storefront-header">
    <div class="header-top-row">
      <div class="header-content-inner">
        <div class="header-actions">
          <div class="cart-btn" (click)="openCart()" id="cart-btn" aria-label="سلة التسوق">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cart-icon">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-badge" *ngIf="(cartCount$ | async) as count">{{ count }}</span>
            <span class="cart-badge zero" *ngIf="!(cartCount$ | async)">0</span>
          </div>

          <div class="nb-phone">
            <div class="nb-phone-icon" title="اتصل بنا">
              <svg width="15" height="15" viewBox="0 0 100 100" fill="currentColor">
                <path d="M83.29,90c-3.44,3.8-9.27,6-16,6a30.77,30.77,0,0,1-5.14-.45C47.23,94.16,31.64,82.89,16,62.09c-9.93-14.87-16.25-35.74-1.64-46a20.15,20.15,0,0,1,10-2.82c4,0,5.28,1.61,5.64,2.92l5,18.05c.55,3.73-1.15,6.94-5.11,9.6-2.17,1.54-2.85,3.4-2,5.47,2.78,4.62,15.4,20.4,22.54,24.2,2.65,1.41,4,.69,5.83-1a15.62,15.62,0,0,0,1.21-1.31c2.55-3.14,5-4.48,7.34-4.09C77.2,70.08,84.11,72.34,85.36,74a9.9,9.9,0,0,1,1.37,4.52C87.19,83.09,86.05,87,83.29,90Z"/>
              </svg>
            </div>
            <div class="nb-phone-text">
              <span class="nb-phone-label">محتاج مساعدة؟</span>
              <a href="tel:199916" class="nb-phone-number">199916</a>
            </div>
          </div>
        </div>

        <div class="header-search-wrap">
          <div class="header-search-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hs-icon">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" [formControl]="searchControl" placeholder="ابحث عن المنتجات، الفئات..." class="header-search-input" id="header-search-input">
          </div>
        </div>

        <a routerLink="/" class="nb-logo" aria-label="معلّم — الصفحة الرئيسية">
          <div class="nb-logo-emblem">
            <svg width="26" height="26" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polygon points="50,5 90,28 90,72 50,95 10,72 10,28"
                       fill="#1B2B6E" stroke="url(#ng)" stroke-width="5" stroke-linejoin="round"/>
              <path d="M30 68V32L50 51L70 32V68"
                    stroke="url(#ng)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="ng" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#FFB400"/>
                  <stop offset="100%" stop-color="#DFBA6B"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="nb-logo-text">
            <span class="nb-logo-name">مَعْلَم</span>
            <span class="nb-logo-tagline">منصة الحرفيين</span>
          </div>
        </a>
      </div>
    </div>

    <!-- Bottom Nav Bar like Tashtiba -->
    <nav class="header-bottom-nav">
      <div class="nav-content">
        <div class="nav-links">
          <a class="nav-link-item" (click)="selectCategory('الكل')" [class.active]="selectedCategory === 'الكل'">جميع الفئات</a>
          <a *ngFor="let card of categoryCards" class="nav-link-item" (click)="selectCategory(card.label)" [class.active]="selectedCategory === card.label">
            {{ card.label }}
          </a>
        </div>
       
      </div>
    </nav>
  </header>
